name: Deploy

# Requires repo secrets before this can run against a real server:
#   SSH_HOST, SSH_USER, SSH_KEY (private key with access to the Lightsail box)
# Optional, for the authenticated Playwright check (skipped without them):
#   SMOKE_TEST_EMAIL, SMOKE_TEST_PASSWORD — a real account on the live site
#   that the smoke suite logs in with read-only. Use a dedicated account,
#   not a real coach/athlete's own login.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      - name: Build frontend
        working-directory: app
        run: npm run build

      - name: Copy frontend build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "app/dist/*"
          target: "/var/www/nadakarate/frontend"
          strip_components: 2

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/nadakarate
            git pull origin main
            cd api
            npm install --production
            npm run migrate
            pm2 restart nadakarate-api
            sudo nginx -s reload

      - name: Health check
        run: |
          sleep 5
          curl -f https://nadakarate.com/api/health

      - name: Smoke test
        run: bash scripts/smoke-test.sh https://nadakarate.com

      - name: Install Playwright browsers
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: app
        env:
          SMOKE_BASE_URL: https://nadakarate.com
          # Optional: set these repo secrets to also exercise a real
          # login + authenticated page load. Skipped automatically if unset.
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7
