name: Deploy

# Requires repo secrets before this can run against a real server:
#   SSH_HOST, SSH_USER, SSH_KEY (private key with access to the Lightsail box)
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      - name: Build frontend
        working-directory: app
        run: npm run build

      - name: Copy frontend build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "app/dist/*"
          target: "/var/www/nadakarate/frontend"
          strip_components: 2

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/nadakarate
            git pull origin main
            cd api
            npm install --production
            npm run migrate
            pm2 restart nadakarate-api
            sudo nginx -s reload

      - name: Health check
        run: |
          sleep 5
          curl -f https://nadakarate.com/api/health
